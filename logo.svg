<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Core gradients -->
    <linearGradient id="frameGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#e8eaed" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#a5b4fc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8eaed" stop-opacity="1"/>
      <stop offset="30%" stop-color="#a5b4fc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="#0f1520" stroke="#262b36" stroke-width="1.5"/>

  <!-- Portal diamond frame -->
  <g filter="url(#outerGlow)">
    <polygon points="100,25 170,100 100,175 30,100" 
             fill="none" stroke="url(#frameGrad)" stroke-width="7" 
             stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- Inner diamond (portal opening) -->
  <polygon points="100,48 148,100 100,152 52,100" 
           fill="url(#innerGlow)" stroke="#6366f1" stroke-width="1.5" opacity="0.7"/>

  <!-- Core orb -->
  <circle cx="100" cy="100" r="18" fill="url(#coreGlow)" filter="url(#softGlow)" opacity="0.9"/>
  <circle cx="100" cy="100" r="8" fill="#e8eaed" opacity="0.95"/>
  <circle cx="100" cy="100" r="3" fill="#ffffff"/>

  <!-- Energy particles -->
  <g opacity="0.6">
    <circle cx="45" cy="70" r="2.5" fill="#a5b4fc"/>
    <circle cx="155" cy="70" r="2" fill="#7c3aed"/>
    <circle cx="45" cy="130" r="2" fill="#7c3aed"/>
    <circle cx="155" cy="130" r="2.5" fill="#a5b4fc"/>
    <circle cx="65" cy="45" r="1.5" fill="#6366f1" opacity="0.4"/>
    <circle cx="135" cy="155" r="1.5" fill="#6366f1" opacity="0.4"/>
  </g>

  <!-- Subtle orbit arc -->
  <path d="M 30 100 A 70 70 0 0 1 170 100" fill="none" stroke="#262b36" stroke-width="1" stroke-dasharray="2,4" opacity="0.4"/>
  <path d="M 30 100 A 70 70 0 0 0 170 100" fill="none" stroke="#262b36" stroke-width="1" stroke-dasharray="2,4" opacity="0.2"/>
</svg>
